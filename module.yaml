manifest_version: 2
name: gstack
version: 0.1.0
description: |
  Sprint workflow integration powered by gstack (by Garry Tan).
  Adds persistent memory, autonomous nightshift gates, enriched retros,
  and journal logging on top of gstack's sprint skills.

  Requires: gstack installed at ~/.claude/skills/gstack/
  Install: git clone https://github.com/garrytan/gstack ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && ./setup

author: datacore-one
attribution: Built on gstack by Garry Tan (https://github.com/garrytan/gstack), MIT license
repository: https://github.com/datacore-one/datacore-gstack
license: MIT

dependencies:
  - core@>=1.0.0

settings:
  gstack_path:
    description: "Path to gstack installation"
    default: "~/.claude/skills/gstack"
  auto_engram_capture:
    description: "Automatically capture engrams from review/qa/retro findings"
    default: true
  nightshift_gates:
    description: "Enable quality gates (review + qa + cso) in nightshift post-build"
    default: true
  retro_trigger:
    description: "When to trigger retro: milestone (on ship) or weekly"
    default: "milestone"
  journal_enrichment:
    description: "Add velocity metrics and session classification to journal entries"
    default: true

provides:
  skills:
    - sprint
    - retro-dc
    - gate
  agents:
    - gstack-gate-runner

hooks:
  post_install: |
    if [ ! -d "${HOME}/.claude/skills/gstack" ]; then
      echo "WARNING: gstack not found at ~/.claude/skills/gstack/"
      echo "Install it: git clone https://github.com/garrytan/gstack ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && ./setup"
    else
      echo "gstack detected at ~/.claude/skills/gstack/ ($(cat ${HOME}/.claude/skills/gstack/VERSION 2>/dev/null || echo 'unknown version'))"
    fi
    for skill_dir in skills/*/; do
      skill_name=$(basename "$skill_dir")
      target="$HOME/.claude/skills/gstack-dc:$skill_name"
      if [ ! -e "$target" ]; then
        ln -s "$(pwd)/$skill_dir" "$target"
        echo "  Skill linked: gstack-dc:$skill_name"
      fi
    done
    echo "Datacore gstack module installed. Use /sprint, /retro-dc, or /gate."

use_cases:
  - Sprint workflow with persistent memory and quality gates
  - Autonomous nightshift code review, QA, and security audit
  - Milestone retros with engram capture and enriched journals
  - GitHub issue-driven autonomous development

status: active

context:
  priority: on_match

engrams:
  namespace: gstack
  scopes: [gstack, sprint, shipping, quality]
